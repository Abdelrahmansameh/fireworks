<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Idle Fireworks</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="main.css">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
    </div>
    <div id="ui-root"></div>

    <!-- Dialogs are singletons, not data-driven -->
    <div id="overlay" class="overlay"></div>
    <div id="confirmation-dialog" class="confirmation-dialog">
        <h3 id="confirmation-title">Confirm</h3>
        <p id="confirmation-message">Are you sure?</p>
        <div class="confirmation-buttons">
            <button id="confirm-action" class="danger-button">Confirm</button>
            <button id="cancel-action">Cancel</button>
        </div>
    </div>

    <div id="notification" class="notification" role="alert" aria-live="assertive"></div>

    <script type="module" src="js/main.js"></script>

</body>

</html>
